name: deploy_on_server
on: [ push ]

jobs:
  build:
    runs-on: self-hosted
    environment: deploy
    steps:
    - name: login
      run: echo ${{secrets.DOCKER_PASSWORD}} | docker login -u ${{secrets.DOCKER_USER}} --password-stdin

    - uses: actions/checkout@v4

    - name: Build the Docker image(frontend)
      run: docker build -t ${{secrets.DOCKER_USER}}/noteorganizer-frontend ./frontend

    - name: Build the Docker image(backend)
      run: docker build -t ${{secrets.DOCKER_USER}}/noteorganizer-backend ./backend

  preparing_for_deploy:
    runs-on: self-hosted
    environment: deploy
    steps:
    - uses: actions/checkout@v4

    - name: import docker-compose file
      run: |
        mkdir -p /opt/NoteOrganizer
        rsync -av --delete ./docker-compose.yml /opt/NoteOrganizer
    - name: insert jwt-token secrets
      run: |
        cd /opt/NoteOrganizer
        echo "JWT_SECRET=${{secrets.JWT_SECRET}}" > .env
  deploy:
    runs-on: self-hosted
    environment: deploy
    needs: 
      build
      preparing_for_deploy
    steps:
    - name: Pull and Up Docker-image
      run: |
        cd /opt/NoteOrganizer
        docker-compose up -d --build
